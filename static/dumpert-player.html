<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dumpert Player - Seamless stream</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <link rel="stylesheet" href="/static/site.css">
    <script src="/static/utils.js" defer></script>
    <style>
        body { background: #0f0f0f; color: #ededed; }
        #page-links { background: #0f0f0f; border: 1px solid #262626; }
        #page-links a { color: #66cc22; font-weight: 700; text-transform: uppercase; letter-spacing: 0.02em; }
        #page-links a[aria-current="page"] { color: #0f0f0f; background: #66cc22; border-radius: 4px; padding: 3px 8px; }
        .hero { display: flex; gap: 0.7rem; align-items: baseline; margin-bottom: 1rem; }
        .hero strong { font-size: 2rem; letter-spacing: -0.03em; }
        .hero span { color: #9d9d9d; text-transform: uppercase; font-weight: 700; }
        .panel { background: #1b1b1b; border: 1px solid #303030; border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
        .controls { display: grid; grid-template-columns: auto 1fr; gap: 0.65rem 1rem; align-items: center; }
        .controls label { color: #66cc22; font-weight: 700; text-transform: uppercase; font-size: 0.83rem; }
        .controls input, .controls select {
            background: #121212; color: #ededed; border: 1px solid #404040; border-radius: 4px; padding: 7px 8px;
        }
        .actions { display: flex; gap: 0.6rem; margin-top: 0.9rem; flex-wrap: wrap; }
        .btn { border: none; border-radius: 6px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.02em; cursor: pointer; padding: 9px 12px; }
        .btn-primary { background: #66cc22; color: #101010; }
        .btn-secondary { background: #2d2d2d; color: #ededed; }
        .status-note { margin-bottom: 1rem; color: #bdbdbd; font-size: 0.92rem; }
        .status-error { margin-bottom: 1rem; }
        video { width: 100%; max-width: 1000px; aspect-ratio: 16/9; background: #000; border: 1px solid #292929; border-radius: 6px; }
        .logger { margin-top: 1rem; }
        #log-box { width: 100%; height: 170px; resize: vertical; background: #101010; color: #98ef70; border: 1px solid #2c2c2c; border-radius: 4px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; line-height: 1.35; padding: 8px; }
    </style>
</head>
<body>
<nav id="page-links" class="page-links mb-1">
    <a href="/">Main</a><a href="device.html">Device View</a><a href="database.html">Database Management</a><a href="maintenance.html">Maintenance</a><a href="monitor.html">Monitor</a><a href="tools.html">Tools</a><a href="shared.html">Shared</a><a href="memo.html">Memo's</a><a href="dumpert.html">Dumpert</a><a href="dumpert-player.html" aria-current="page">Dumpert Player</a>
    <button type="button" data-role="theme-toggle" class="theme-toggle focus-ring" aria-label="Toggle dark mode">🌙 Dark</button>
</nav>

<main>
    <div class="hero"><strong>DUMPERT</strong><span>Seamless player</span></div>

    <section class="panel">
        <div class="controls">
            <label for="item-id">Item ID / URL</label>
            <input id="item-id" placeholder="Bijv: 100125335_2757919b of https://dumpert.nl/item/..." />
            <label for="nsfw">NSFW</label>
            <select id="nsfw" aria-label="NSFW instelling"><option value="1" selected>Yes Please</option><option value="0">No Gross</option></select>
        </div>
        <div class="actions">
            <button type="button" id="load-sample" class="btn btn-secondary">1e topper laden</button>
            <button type="button" id="play-seamless" class="btn btn-primary">Seamless afspelen</button>
            <button type="button" id="clear-log" class="btn btn-secondary">Log leegmaken</button>
        </div>
    </section>

    <div class="status-note" id="status-note">De player doet een achtergrond-check (diagnostics + multi-strategy prewarm), probeert meerdere streamroutes en meldt advertentie-signalen vooraf.</div>
    <div id="error" class="status-message status-error" role="alert" aria-live="polite"></div>

    <video id="seamless-video" controls playsinline preload="auto"></video>

    <section class="logger" aria-label="Debug log">
        <textarea id="log-box" readonly aria-label="Player logs"></textarea>
    </section>
</main>

<script>
(function() {
    'use strict';

    const itemIdInput = document.getElementById('item-id');
    const nsfwEl = document.getElementById('nsfw');
    const loadSampleBtn = document.getElementById('load-sample');
    const playBtn = document.getElementById('play-seamless');
    const clearLogBtn = document.getElementById('clear-log');
    const errorEl = document.getElementById('error');
    const statusNote = document.getElementById('status-note');
    const video = document.getElementById('seamless-video');
    const logBox = document.getElementById('log-box');
    let hlsInstance = null;
    let hlsScriptPromise = null;

    function appendLog(message, context) {
        const stamp = new Date().toISOString();
        const ctx = context ? ` | ${JSON.stringify(context)}` : '';
        logBox.value += `[${stamp}] ${message}${ctx}\n`;
        logBox.scrollTop = logBox.scrollHeight;
    }

    function showError(message) {
        errorEl.textContent = message;
        errorEl.style.display = 'block';
        appendLog(`ERROR: ${message}`);
    }

    function clearError() {
        errorEl.textContent = '';
        errorEl.style.display = 'none';
    }

    function destroyHlsInstance() {
        if (hlsInstance) {
            hlsInstance.destroy();
            hlsInstance = null;
        }
    }

    function canPlayNativeHls() {
        const support = video.canPlayType('application/vnd.apple.mpegurl');
        return support === 'probably' || support === 'maybe';
    }

    function loadHlsScript() {
        if (window.Hls) return Promise.resolve(window.Hls);
        if (hlsScriptPromise) return hlsScriptPromise;

        hlsScriptPromise = new Promise((resolve, reject) => {
            const script = document.createElement('script');
            script.src = 'https://cdn.jsdelivr.net/npm/hls.js@1.6.3/dist/hls.min.js';
            script.onload = () => resolve(window.Hls);
            script.onerror = () => reject(new Error('Kon hls.js niet laden vanaf CDN.'));
            document.head.appendChild(script);
        });
        return hlsScriptPromise;
    }

    async function setPlaybackSource(sourceUrl, isHlsPlaylist) {
        destroyHlsInstance();
        video.removeAttribute('src');

        if (!isHlsPlaylist || canPlayNativeHls()) {
            video.src = sourceUrl;
            appendLog(isHlsPlaylist ? 'HLS wordt native afgespeeld door de browser.' : 'Directe mediabron ingesteld (geen HLS).');
            return;
        }

        const Hls = await loadHlsScript();
        if (!Hls || !Hls.isSupported()) {
            throw new Error('HLS wordt niet ondersteund in deze browser (native + hls.js niet beschikbaar).');
        }

        hlsInstance = new Hls({
            enableWorker: true,
            lowLatencyMode: false,
            backBufferLength: 90,
        });
        hlsInstance.attachMedia(video);
        hlsInstance.on(Hls.Events.MEDIA_ATTACHED, () => {
            hlsInstance.loadSource(sourceUrl);
        });
        hlsInstance.on(Hls.Events.ERROR, (eventName, data) => {
            const level = data && data.fatal ? 'FATAL' : 'WARN';
            appendLog(`HLS.js ${level}: type=${data?.type || '-'} details=${data?.details || '-'}`);
            if (data?.fatal) {
                destroyHlsInstance();
            }
        });
        appendLog('HLS playlist ingesteld via hls.js.');
    }

    function parseItemId(value) {
        const trimmed = String(value || '').trim();
        if (!trimmed) return '';
        const fromUrl = trimmed.match(/\/item\/([^/?#]+)/i);
        return fromUrl ? fromUrl[1] : trimmed;
    }

    function findUrls(value, bucket) {
        if (!value) return;
        if (typeof value === 'string') {
            if (/^https?:\/\//i.test(value)) bucket.push(value);
            return;
        }
        if (Array.isArray(value)) {
            value.forEach((entry) => findUrls(entry, bucket));
            return;
        }
        if (typeof value === 'object') Object.values(value).forEach((entry) => findUrls(entry, bucket));
    }

    function pickMediaUrls(item) {
        const urls = [];
        findUrls(item, urls);
        const unique = Array.from(new Set(urls));
        return {
            mp4: unique.find((u) => /\.mp4(\?|$)/i.test(u)) || '',
            webm: unique.find((u) => /\.webm(\?|$)/i.test(u)) || '',
            m3u8: unique.find((u) => /\.m3u8(\?|$)/i.test(u)) || '',
        };
    }

    async function fetchToppersPage(page, nsfw) {
        const params = nsfw === '1' ? '?nsfw=1' : '';
        const response = await fetch(`/api/dumpert/toppers/${page}${params}`);
        if (!response.ok) {
            const details = await response.text().catch(() => response.statusText);
            throw new Error(`Kon toppers niet ophalen (${response.status}): ${details}`);
        }
        const payload = await response.json();
        if (!payload || !Array.isArray(payload.items)) throw new Error('Onverwacht API formaat: items ontbreekt.');
        return payload.items;
    }

    async function resolveItemWithStreamPlan() {
        const requestedId = parseItemId(itemIdInput.value);
        const query = new URLSearchParams({ page: '0' });
        if (nsfwEl.value === '1') query.set('nsfw', '1');
        if (requestedId) query.set('item_id', requestedId);

        const response = await fetch(`/api/dumpert/bootstrap?${query.toString()}`);
        if (!response.ok) {
            const details = await response.text().catch(() => response.statusText);
            throw new Error(`Bootstrap mislukt (${response.status}): ${details}`);
        }
        const payload = await response.json();
        if (!payload || !payload.item || !Array.isArray(payload.stream_candidates)) {
            throw new Error('Onverwacht bootstrap formaat ontvangen.');
        }
        if (payload.ad_signals?.detected) {
            statusNote.textContent = 'Let op: er zijn advertentie-signalen gevonden in de streambronnen.';
            appendLog('Advertentie-signalen gevonden, gebruiker geïnformeerd.', payload.ad_signals);
        }
        return payload;
    }

    function proxiedUrl(url, rangeStart) {
        const out = `/api/dumpert/media-proxy?url=${encodeURIComponent(url)}`;
        if (typeof rangeStart === 'number') return `${out}&range_start=${rangeStart}`;
        return out;
    }

    async function fetchDiagnostics(url) {
        const response = await fetch(`/api/dumpert/media-diagnostics?url=${encodeURIComponent(url)}`);
        if (!response.ok) {
            throw new Error(`Diagnostics failed (${response.status})`);
        }
        return response.json();
    }

    async function prewarmProxyStream(url) {
        const warmupUrl = proxiedUrl(url, 0);
        const response = await fetch(warmupUrl, {
            method: 'GET',
            headers: { Range: 'bytes=0-65535' },
        });
        if (!response.ok) {
            throw new Error(`Warmup failed (${response.status})`);
        }
        const reader = response.body && response.body.getReader ? response.body.getReader() : null;
        if (reader) {
            await reader.read();
            reader.cancel().catch(() => {});
        }
    }

    function candidateToOriginalMediaUrl(candidateUrl) {
        if (!candidateUrl.includes('/api/dumpert/media-proxy?url=')) return candidateUrl;
        const encoded = candidateUrl.split('url=')[1]?.split('&')[0] || '';
        return decodeURIComponent(encoded);
    }

    async function tryBackgroundLoad(candidate) {
        const started = performance.now();
        appendLog('Achtergrond poging gestart.', candidate);
        if (candidate.mode.includes('prewarm')) {
            await prewarmProxyStream(candidateToOriginalMediaUrl(candidate.url));
        }
        const elapsedMs = Math.round(performance.now() - started);
        appendLog(`Achtergrond poging geslaagd in ${elapsedMs}ms`, candidate);
        return true;
    }

    async function playSeamless() {
        clearError();
        destroyHlsInstance();
        video.pause();
        video.removeAttribute('src');
        video.load();

        const plan = await resolveItemWithStreamPlan();
        const item = plan.item || {};
        const media = plan.stream_sources || {};
        const preferred = plan.preferred_stream;
        const usingHls = !media.mp4 && !media.webm && !!media.m3u8;
        itemIdInput.value = item.id || '';

        if (!preferred) throw new Error('Geen video URL (mp4/webm/m3u8) gevonden in bootstrap payload.');

        statusNote.textContent = `Item ${item.id || 'n/a'} wordt voorbereid voor seamless playback.`;
        appendLog(`Gekozen item: ${item.id || 'onbekend'} - ${item.title || 'zonder titel'}`, { sourceUrlCount: plan.source_url_count || 0 });
        appendLog(`Bronnen: mp4=${media.mp4 || '-'} | webm=${media.webm || '-'} | m3u8=${media.m3u8 || '-'}`);
        appendLog('Beschikbare laadstrategieën ontvangen.', { candidates: plan.stream_candidates.length });

        const diag = await fetchDiagnostics(preferred);
        appendLog(`Diagnostics: status=${diag.status} type=${diag.content_type || '-'} len=${diag.content_length || '-'} range=${diag.accept_ranges || '-'} sniff=${diag.sniff || '-'}`);

        let lastError = null;
        for (const candidate of plan.stream_candidates) {
            try {
                await tryBackgroundLoad(candidate);
                await setPlaybackSource(candidate.url, usingHls);
                statusNote.textContent = `Playback actief via strategie: ${candidate.name} (item ${item.id || 'n/a'}).`;
                appendLog('Playback bron gekozen en naar front-end doorgezet.', candidate);
                lastError = null;
                break;
            } catch (error) {
                lastError = error;
                appendLog(`Strategie mislukt: ${error.message}`, candidate);
            }
        }

        if (lastError) {
            throw new Error(`Geen enkele streamstrategie werkte: ${lastError.message}`);
        }

        video.load();
        appendLog(`Playback bron ingesteld: ${usingHls ? '(HLS playlist geladen)' : video.src}`, { currentSrc: video.currentSrc || '-' });
    }

    ['loadstart', 'loadedmetadata', 'canplay', 'playing', 'stalled', 'waiting', 'error', 'ended'].forEach((evt) => {
        video.addEventListener(evt, () => {
            const err = video.error ? ` errCode=${video.error.code}` : '';
            appendLog(`VIDEO ${evt}: readyState=${video.readyState} networkState=${video.networkState}${err}`);
        });
    });

    clearLogBtn.addEventListener('click', () => {
        logBox.value = '';
    });

    loadSampleBtn.addEventListener('click', async () => {
        clearError();
        try {
            const plan = await resolveItemWithStreamPlan();
            itemIdInput.value = plan.item?.id || '';
            appendLog(`Sample geladen: ${plan.item?.id || 'onbekend'} - ${plan.item?.title || 'zonder titel'}`);
            appendLog('Bootstrap data ontvangen en geparsed voor front-end.', {
                hasPreferred: Boolean(plan.preferred_stream),
                candidateCount: (plan.stream_candidates || []).length,
                adSignals: Boolean(plan.ad_signals?.detected),
            });
        } catch (error) {
            showError(error.message);
        }
    });

    playBtn.addEventListener('click', async () => {
        try {
            await playSeamless();
        } catch (error) {
            showError(error.message);
        }
    });

    appendLog('Dumpert seamless player geladen. Gebruik "1e topper laden" en daarna "Seamless afspelen".');
})();
</script>
</body>
</html>
